name: Draft Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write
  id-token: write

jobs:
  check-ci-status:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Install Python deps
        run: pip install pyyaml

      - name: Verify CI passed for this commit
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: python .github/workflows/release/release.py check-ci "${{ github.sha }}"

  # Determines whether this tag should update :latest on GHCR.
  # Runs once; the Docker job consumes its output via matrix.
  determine-latest:
    needs: [check-ci-status]
    runs-on: ubuntu-latest
    timeout-minutes: 2
    outputs:
      value: ${{ steps.is_latest.outputs.value }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check is-latest
        id: is_latest
        run: |
          VALUE=$(python .github/workflows/release/release.py is-latest "${{ github.ref_name }}")
          echo "value=$VALUE" >> $GITHUB_OUTPUT

  # Builds the x64 and arm64 binaries for Linux, for all 3 crates, via the Docker builder
  build-binaries-linux:
    needs: [check-ci-status]
    timeout-minutes: 60
    strategy:
      matrix:
        target:
          - amd64
          - arm64
        name:
          - commit-boost-cli
          - commit-boost-pbs
          - commit-boost-signer
        include:
          - target: amd64
            package-suffix: x86-64
          - target: arm64
            package-suffix: arm64
          - name: commit-boost-cli
            target-crate: cli
          - name: commit-boost-pbs
            target-crate: pbs
          - name: commit-boost-signer
            target-crate: signer
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: true

      - name: Log commit hash
        run: |
          echo "Releasing commit: $(git rev-parse HEAD)"

      - name: Set lowercase owner
        run: echo "OWNER=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build binary (Linux)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          platforms: linux/amd64,linux/arm64
          cache-from: type=registry,ref=ghcr.io/${{ env.OWNER }}/buildcache:${{ matrix.target-crate}}
          cache-to: type=registry,ref=ghcr.io/${{ env.OWNER }}/buildcache:${{ matrix.target-crate }},mode=max
          file: provisioning/build.Dockerfile
          outputs: type=local,dest=build
          build-args: |
            TARGET_CRATE=${{ matrix.name }}

      - name: Package binary (Linux)
        run: |
          cd build/linux_${{ matrix.target }}
          tar -czvf ${{ matrix.name }}-${{ github.ref_name }}-linux_${{ matrix.package-suffix }}.tar.gz ${{ matrix.name }}
          mv ${{ matrix.name }}-${{ github.ref_name }}-linux_${{ matrix.package-suffix }}.tar.gz ../../

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}-${{ github.ref_name }}-linux_${{ matrix.package-suffix }}
          path: |
            ${{ matrix.name }}-${{ github.ref_name }}-linux_${{ matrix.package-suffix }}.tar.gz

  # Builds the arm64 binaries for Darwin, for all 3 crates, natively
  build-binaries-darwin:
    needs: [check-ci-status]
    timeout-minutes: 60
    strategy:
      matrix:
        target:
          # x64 requires macos-latest-large which is not available in the free tier
          # - x86_64-apple-darwin
          - aarch64-apple-darwin
        name:
          - commit-boost-cli
          - commit-boost-pbs
          - commit-boost-signer
        include:
          # - target: x86_64-apple-darwin
          #   os: macos-latest-large
          #   package-suffix: x86-64
          - target: aarch64-apple-darwin
            os: macos-latest
            package-suffix: arm64
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: true

      - name: Log commit hash
        run: |
          echo "Releasing commit: $(git rev-parse HEAD)"

      - name: Install Protoc
        run:
          # Brew's version is much more up to date than the Linux ones, and installing the latest via script runs into curl issues so for now, brew's easier to use
          # provisioning/protoc.sh
          brew install protobuf

      - name: Cache Cargo registry
        uses: actions/cache@v3
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache Cargo index
        uses: actions/cache@v3
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-git-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache Cargo build
        uses: actions/cache@v3
        with:
          path: target
          key: ${{ runner.os }}-cargo-build-${{ matrix.target }}-${{ matrix.name }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-build-${{ matrix.target }}-${{ matrix.name }}-
            ${{ runner.os }}-cargo-build-${{ matrix.target }}-
            ${{ runner.os }}-cargo-build-

      - name: Build binary (Darwin)
        run: cargo build --release --target ${{ matrix.target }} --bin ${{ matrix.name }}

      - name: Package binary (Darwin)
        run: |
          cd target/${{ matrix.target }}/release
          tar -czvf ${{ matrix.name }}-${{ github.ref_name }}-darwin_${{ matrix.package-suffix }}.tar.gz ${{ matrix.name }}
          mv ${{ matrix.name }}-${{ github.ref_name }}-darwin_${{ matrix.package-suffix }}.tar.gz ../../../

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}-${{ github.ref_name }}-darwin_${{ matrix.package-suffix }}
          path: |
            ${{ matrix.name }}-${{ github.ref_name }}-darwin_${{ matrix.package-suffix }}.tar.gz

  # Builds and pushes Docker images for both PBS and Signer
  build-and-push-docker:
    needs: [check-ci-status, build-binaries-linux, determine-latest]
    strategy:
      matrix:
        crate: [pbs, signer]
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: true

      - name: Download binary archives
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts
          pattern: "commit-boost-*"

      - name: Extract binaries
        run: |
          mkdir -p ./artifacts/bin/linux_amd64
          mkdir -p ./artifacts/bin/linux_arm64
          tar -xzf ./artifacts/commit-boost-${{ matrix.crate }}-${{ github.ref_name }}-linux_x86-64/commit-boost-${{ matrix.crate }}-${{ github.ref_name }}-linux_x86-64.tar.gz -C ./artifacts/bin
          mv ./artifacts/bin/commit-boost-${{ matrix.crate }} ./artifacts/bin/linux_amd64/commit-boost-${{ matrix.crate }}
          tar -xzf ./artifacts/commit-boost-${{ matrix.crate }}-${{ github.ref_name }}-linux_arm64/commit-boost-${{ matrix.crate }}-${{ github.ref_name }}-linux_arm64.tar.gz -C ./artifacts/bin
          mv ./artifacts/bin/commit-boost-${{ matrix.crate }} ./artifacts/bin/linux_arm64/commit-boost-${{ matrix.crate }}

      - name: Set lowercase owner
        run: echo "OWNER=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          build-args: |
            BINARIES_PATH=./artifacts/bin
          tags: |
            ghcr.io/${{ env.OWNER }}/${{ matrix.crate }}:${{ github.ref_name }}
            ${{ needs.determine-latest.outputs.value == 'true' && format('ghcr.io/{0}/{1}:latest', env.OWNER, matrix.crate) || '' }}
          file: provisioning/${{ matrix.crate }}.Dockerfile

  # Signs all Linux binaries with Sigstore for provenance
  sign-binaries:
    needs: [check-ci-status, build-binaries-linux]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Download binary artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts
          pattern: "commit-boost-*linux*"

      - name: Sign all binaries with Sigstore
        uses: sigstore/gh-action-sigstore-python@v3.0.0
        with:
          inputs: ./artifacts/**/*.tar.gz

      - name: Upload signed artifacts
        uses: actions/upload-artifact@v4
        with:
          name: signed-${{ github.ref_name }}
          path: ./artifacts/**/*

  # Signs all Linux binaries with Sigstore for provenance
  sign-binaries:
    needs: [build-binaries-linux]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Download binary artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts
          pattern: "commit-boost-*linux*"

      - name: Sign all binaries with Sigstore
        uses: sigstore/gh-action-sigstore-python@v3.0.0
        with:
          inputs: ./artifacts/**/*.tar.gz

      - name: Upload signed artifacts
        uses: actions/upload-artifact@v4
        with:
          name: signed-${{ github.ref_name }}
          path: ./artifacts/**/*

  # Creates a draft release on GitHub with the binaries
  finalize-release:
    needs:
      - check-ci-status
      - build-binaries-linux
      - build-binaries-darwin
      - build-and-push-docker
      - sign-binaries
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Download artifacts (binaries + signed bundles)
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts
          pattern: |
            commit-boost-*
            signed-*

      - name: Finalize Release
        uses: softprops/action-gh-release@v2
        with:
          files: ./artifacts/**/*
          draft: true
          prerelease: false
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
